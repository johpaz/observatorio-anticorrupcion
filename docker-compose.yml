version: '3.9'

services:
  procuraduria:
    image: johpaz/secop-procuraduria:latest
    build:
      context: "./APi Procuraduria, multas, sanciones y obras inconclusas"
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - n8n_evoapi

  api:
    image: johpaz/secop-api:latest
    build:
      context: ./api
    depends_on:
      procuraduria:
        condition: service_healthy
    environment:
      - SOCRATA_APP_TOKEN=${SOCRATA_APP_TOKEN:-cXYVUaiVij5vOg4kc9EvQtSI1}
      - PORT=3001
      - CACHE_TTL=300
      - PROCURADURIA_URL=http://procuraduria:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./anticorrup.db:/app/anticorrup.db
    restart: unless-stopped
    networks:
      - n8n_evoapi

  hive:
    image: johpaz/secop-hive:latest
    build:
      context: "./hive agents"
    depends_on:
      api:
        condition: service_healthy
      procuraduria:
        condition: service_healthy
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECOP_API_URL=http://api:3001
      - PROCURADURIA_URL=http://procuraduria:3000
      - PORT=4000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4000' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - n8n_evoapi

  frontend:
    image: johpaz/secop-frontend:latest
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.dash_col_5.rule=Host(`${DASHBOARD_DOMAIN}`)
      - traefik.http.routers.dash_col_5.entrypoints=web,websecure
      - traefik.http.routers.dash_col_5.tls=true
      - traefik.http.routers.dash_col_5.tls.certresolver=mytlschallenge
      - traefik.http.routers.dash_col_5.middlewares=dash_col_5-headers@docker
      - traefik.http.middlewares.dash_col_5-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.dash_col_5-headers.headers.STSSeconds=315360000
      - traefik.http.services.dash_col_5.loadbalancer.server.port=80
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:
    external: true
