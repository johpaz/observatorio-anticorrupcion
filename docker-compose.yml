services:
  procuraduria:
    image: johpaz/secop-procuraduria:latest
    environment:
      - PORT=3000
    restart: unless-stopped
    networks:
      - n8n_evoapi

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: johpaz/secop-api:latest
    depends_on:
      - procuraduria
    environment:
      - SOCRATA_APP_TOKEN=${SOCRATA_APP_TOKEN}
      - PORT=3001
      - CACHE_TTL=300
      - PROCURADURIA_URL=http://procuraduria:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HIVE_HOME=/app/hive-data
      - HIVE_MASTER_KEY=${HIVE_MASTER_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-false}
    volumes:
      - ./anticorrup.db:/app/anticorrup.db
      - ./hive-data:/app/hive-data
    restart: unless-stopped
    networks:
      - n8n_evoapi

  frontend:
    image: johpaz/secop-frontend:latest
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.observatorio.rule=Host(`${DASHBOARD_DOMAIN}`)
      - traefik.http.routers.observatorio.entrypoints=web,websecure
      - traefik.http.routers.observatorio.tls=true
      - traefik.http.routers.observatorio.tls.certresolver=mytlschallenge
      - traefik.http.routers.observatorio.middlewares=observatorio-headers@docker
      - traefik.http.middlewares.observatorio-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.observatorio-headers.headers.STSSeconds=315360000
      - traefik.http.services.observatorio.loadbalancer.server.port=80
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:
    external: true
