version: '3.9'

services:
  api:
    build:
      context: ./api
    ports:
      - "3001:3001"
    environment:
      - SOCRATA_APP_TOKEN=${SOCRATA_APP_TOKEN:-cXYVUaiVij5vOg4kc9EvQtSI1}
      - PORT=3001
      - CACHE_TTL=300
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
